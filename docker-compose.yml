name: recruitment-assistant

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: docker
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      RECRUITMENT_EXECUTION_MODE: "${RECRUITMENT_EXECUTION_MODE:-deterministic}"
      CREWAI_TRACING_ENABLED: "${CREWAI_TRACING_ENABLED:-true}"
      CREWAI_TELEMETRY_OPT_OUT: "${CREWAI_TELEMETRY_OPT_OUT:-false}"
      CREWAI_MODEL: "${CREWAI_MODEL:-gemini-3.1-pro-preview}"
      CREWAI_PROVIDER: "${CREWAI_PROVIDER:-google}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
